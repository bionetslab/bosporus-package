name: Python application

on:
  push:
    paths:
      - 'bosporus/**'
      - 'tests/**'
      - '.github/workflows/**'
permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}  # required for conda activation to persist across steps

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v4
      with:
        miniconda-version: 'latest'
        python-version: "3.10"
        channels: conda-forge
        channel-priority: strict
        activate-environment: bosporus-env  # named env, activated in every step
        auto-activate-base: false           # don't use base, use the named env

    - name: Install graph-tool and dependencies via conda
      run: |
        conda install -y graph-tool
    
    - name: Install package and test dependencies
      run: |
        conda run -n bosporus-env pip install --upgrade pip
        conda run -n bosporus-env pip install flake8 pytest
        if [ -f requirements.txt ]; then conda run -n bosporus-env pip install -r requirements.txt; fi
        conda run -n bosporus-env pip install -e .
    
    - name: Lint with flake8
      run: |
        conda run -n bosporus-env flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        conda run -n bosporus-env flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Test with pytest
      run: |
        conda run -n bosporus-env pytest
